name: Brew Tap Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync (for example: v3.12.1-acs-1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest
    env:
      TAP_OWNER: peiliqiancdt
      TAP_REPO: homebrew-tap
      TAP_BRANCH: main

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${RELEASE_TAG:-}}"
          if [[ -z "${tag}" ]]; then
            echo "No release tag was provided." >&2
            exit 1
          fi

          if [[ "${tag}" != v* ]]; then
            echo "Tag must start with 'v'. Got: ${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # Required secrets:
          # - HOMEBREW_TAP_APP_ID
          # - HOMEBREW_TAP_APP_PRIVATE_KEY
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: ${{ env.TAP_OWNER }}
          repositories: ${{ env.TAP_REPO }}

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          checksums_name="sops-v${VERSION}.checksums.txt"
          checksums_url="$(gh api "repos/${RELEASE_REPO}/releases/tags/${TAG}" --jq ".assets[] | select(.name == \"${checksums_name}\") | .browser_download_url")"

          if [[ -z "${checksums_url}" ]]; then
            echo "Unable to find ${checksums_name} in release ${TAG}." >&2
            exit 1
          fi

          curl -fsSL "${checksums_url}" -o checksums.txt

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_OWNER }}/${{ env.TAP_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap
          fetch-depth: 0

      - name: Regenerate formula
        working-directory: homebrew-tap
        env:
          RELEASE_REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          darwin_amd64_file="sops-v${VERSION}.darwin.amd64"
          darwin_arm64_file="sops-v${VERSION}.darwin.arm64"
          linux_amd64_file="sops-v${VERSION}.linux.amd64"
          linux_arm64_file="sops-v${VERSION}.linux.arm64"

          darwin_amd64_sha="$(awk -v file="${darwin_amd64_file}" '$2 == file { print $1; exit }' ../checksums.txt)"
          darwin_arm64_sha="$(awk -v file="${darwin_arm64_file}" '$2 == file { print $1; exit }' ../checksums.txt)"
          linux_amd64_sha="$(awk -v file="${linux_amd64_file}" '$2 == file { print $1; exit }' ../checksums.txt)"
          linux_arm64_sha="$(awk -v file="${linux_arm64_file}" '$2 == file { print $1; exit }' ../checksums.txt)"

          if [[ -z "${darwin_amd64_sha}" || -z "${darwin_arm64_sha}" || -z "${linux_amd64_sha}" || -z "${linux_arm64_sha}" ]]; then
            echo "Missing at least one checksum entry for release ${TAG}." >&2
            exit 1
          fi

          mkdir -p Formula
          cat > Formula/sops.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # This file was generated by GitHub Actions. DO NOT EDIT.
          class Sops < Formula
            desc "Editor of encrypted files"
            homepage "https://github.com/${RELEASE_REPO}"
            version "${VERSION}"
            license "MPL-2.0"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/${RELEASE_REPO}/releases/download/${TAG}/${darwin_amd64_file}"
                sha256 "${darwin_amd64_sha}"

                define_method(:install) do
                  bin.install "sops-v#{version}.#{OS.kernel_name.downcase}.#{Hardware::CPU.arch}" => "sops"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/${RELEASE_REPO}/releases/download/${TAG}/${darwin_arm64_file}"
                sha256 "${darwin_arm64_sha}"

                define_method(:install) do
                  bin.install "sops-v#{version}.#{OS.kernel_name.downcase}.#{Hardware::CPU.arch}" => "sops"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/${RELEASE_REPO}/releases/download/${TAG}/${linux_amd64_file}"
                sha256 "${linux_amd64_sha}"

                define_method(:install) do
                  bin.install "sops-v#{version}.#{OS.kernel_name.downcase}.#{Hardware::CPU.arch}" => "sops"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/${RELEASE_REPO}/releases/download/${TAG}/${linux_arm64_file}"
                sha256 "${linux_arm64_sha}"

                define_method(:install) do
                  bin.install "sops-v#{version}.#{OS.kernel_name.downcase}.#{Hardware::CPU.arch}" => "sops"
                end
              end
            end

            test do
              system "#{bin}/sops", "--version"
            end
          end
          EOF

      - name: Commit and push formula update
        working-directory: homebrew-tap
        env:
          BOT_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          TAG: ${{ steps.meta.outputs.tag }}
          TAP_BRANCH: ${{ env.TAP_BRANCH }}
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula/sops.rb; then
            echo "Formula already up to date for ${TAG}."
            exit 0
          fi

          git config user.name "${BOT_NAME:-github-actions[bot]}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/sops.rb
          git commit -m "chore: bump sops to ${TAG}"
          git push origin HEAD:${TAP_BRANCH}
